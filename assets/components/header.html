<header x-data="{ open: false }" class="w-full h-16 border-b border-neutral-800">
    <nav class="w-[90%] md:w-[60%] mx-auto px-4 h-full">
        <div class="flex items-center justify-between h-full">

            <a class="text-3xl text-white" href="/">تـــاز</a>

            <div class="hidden md:flex items-center gap-10 text-[#A1A1AA]">
                <a class="hover:text-[#A78BFA] transition-colors" href="#">بلاگ</a>
                <a class="hover:text-[#A78BFA] transition-colors" href="#">قوانین</a>
                <a class="hover:text-[#A78BFA] transition-colors" href="#">ارتباط</a>
            </div>

            
            <button
                type="button"
                @click="open = !open"
                :aria-expanded="open.toString()"
                aria-controls="mobile-menu"
                aria-label="باز کردن منو"
                class="md:hidden text-neutral-400 hover:text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </nav>

    <div id="mobile-menu" x-cloak x-show="open" @click.outside="open = false"
         class="md:hidden bg-[#1E1E2A] absolute w-full left-0 right-0 z-50 border-t border-[#2E2E3F]">
        <div class="container mx-auto px-4 py-3 flex flex-col space-y-3 text-center text-[#A1A1AA]">
            <a class="hover:text-[#E4E4E7] py-2 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400" href="#">بلاگ</a>
            <a class="hover:text-[#E4E4E7] py-2 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400" href="#">قوانین</a>
            <a class="hover:text-[#E4E4E7] py-2 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400" href="#">ارتباط</a>
        </div>
    </div>
</header>
