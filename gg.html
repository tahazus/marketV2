<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- HEADER -->
<header class="bg-white shadow fixed top-0 w-full z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-xl font-bold">MiniShop</h1>

    <nav class="flex gap-4 text-sm">
      <a href="#" class="hover:text-blue-500">Home</a>
      <a href="#products" class="hover:text-blue-500">Products</a>
    </nav>

    <button onclick="toggleCart()" class="relative">
      🛒
      <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1 rounded-full">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<section class="pt-24 text-center py-16 bg-gradient-to-r from-blue-500 to-indigo-600 text-white">
  <h2 class="text-3xl font-bold">به MiniShop خوش آمدید</h2>
  <p class="mt-2">بهترین محصولات دیجیتال با طراحی ساده</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

</section>

<!-- CART SIDEBAR -->
<div id="cart" class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-4 hidden flex flex-col">
  <h2 class="text-lg font-bold mb-4">سبد خرید</h2>

  <div id="cartItems" class="flex-1 overflow-auto"></div>

  <div class="border-t pt-2">
    <p class="font-bold">Total: $<span id="total">0</span></p>
    <button class="w-full bg-green-500 text-white py-2 mt-2">Checkout</button>
  </div>
</div>

<script>
const products = [
  { id: 1, name: "iPhone 14", price: 900 },
  { id: 2, name: "MacBook Pro", price: 2500 },
  { id: 3, name: "AirPods Pro", price: 250 }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// render products
function renderProducts() {
  const container = document.getElementById("products");

  products.forEach(p => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold">${p.name}</h3>
        <p class="text-gray-500">$${p.price}</p>
        <button onclick='addToCart(${p.id})'
          class="mt-3 bg-blue-500 text-white px-3 py-1 rounded">
          Add to Cart
        </button>
      </div>
    `;
  });
}

// add to cart
function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

// update cart UI
function updateCart() {
  document.getElementById("cartCount").innerText = cart.length;

  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach((item, i) => {
    total += item.price;

    cartItems.innerHTML += `
      <div class="flex justify-between border-b py-2">
        <span>${item.name}</span>
        <span>$${item.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

// toggle cart
function toggleCart() {
  document.getElementById("cart").classList.toggle("hidden");
}

// init
renderProducts();
updateCart();
</script>

</body>
</html>
